name: GitHub Metrics

on:
  schedule:
    - cron: '0 0 * * *'  # Jalankan setiap hari jam 00:00 UTC
  workflow_dispatch:       # Bisa di-trigger manual
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # --- Kartu 1: GitHub Stats Overview ---
      - name: Generate GitHub Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics-stats.svg
          user: halimsumbogo
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Jakarta
          config_display: large
          plugin_lines: yes

      # --- Kartu 2: Most Used Languages ---
      - name: Generate Languages Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics-languages.svg
          user: halimsumbogo
          template: classic
          base: ""
          config_timezone: Asia/Jakarta
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
